<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payslip Preview</title>
<link rel="stylesheet" href="portal/css/portal.css">
<style>
  body { background: #fff; padding: 0; margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
  .preview-wrap { max-width: 100%; margin: 0; background: #fff; border-radius: 0; box-shadow: none; padding: 0; }
</style>
</head>
<body>
<div class="preview-wrap" id="root">Loading…</div>

<script src="portal/js/portal.js"></script>
<script>
  const ps = {
    id: 1,
    employee_name: 'Vamshi Pasham',
    employee_code: 'PAX-0099',
    designation: 'Software Developer',
    department: 'Engineering',
    month: 4,
    year: 2026,
    working_days: 22,
    present_days: 21,
    lossOfPayDays: 1,
    gross_earnings: 66818,
    total_deductions: 9300,
    net_pay: 57518
  };
  const emp = {
    date_of_joining: '2024-01-15',
    pan: 'ABCDE1234F',
    uan: '101234567890',
    phone: '+91 9000000000',
    bank_name: 'HDFC Bank',
    bank_account: '50100123456789',
    ifsc_code: 'HDFC0001234'
  };
  const earn = { basic: 28636, hra: 14318, specialAllowance: 23864 };
  const ded  = {
    employeePF: 1800,
    voluntaryPF: 2000,
    npsEmployee: 1500,
    professionalTax: 200,
    tds: 3800,
    employeeESI: 0
  };
  const empContrib = {
    employerPF: 1800,
    employerEPF: 550,
    employerEPS: 1250,
    employerESI: 0,
    employerNPS: 3000,
    gratuityMonthly: 1442,
    regime: 'new',
    effectiveExemptions: 36000,
    tdsAnnual: 45600
  };

  try {
    document.getElementById('root').innerHTML = renderPayslip(ps, emp, earn, ded, empContrib);
  } catch (e) {
    document.getElementById('root').innerHTML = '<pre style="color:red">Error: ' + e.message + '</pre>';
    console.error(e);
  }
</script>
</body>
</html>
