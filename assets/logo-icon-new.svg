<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001233"/>
      <stop offset="50%" stop-color="#023e8a"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90e0ef"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Arrow-P mark: bold P with angular arrow bowl -->
  <path d="M148 88 L308 88 L390 180 L308 270 L214 270 L214 424 L148 424Z
           M214 148 L300 148 L350 180 L300 212 L214 212Z"
        fill="white" fill-rule="evenodd"/>
  <!-- Accent node with glow -->
  <circle cx="348" cy="58" r="28" fill="#00b4d8" filter="url(#glow)" opacity="0.45"/>
  <circle cx="348" cy="58" r="20" fill="url(#dot)"/>
</svg>