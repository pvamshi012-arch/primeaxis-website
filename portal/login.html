<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeAxis IT — Employee Portal Login</title>
    <link rel="icon" type="image/svg+xml" href="../assets/logo-icon-new.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #050810 0%, #0a1225 25%, #101d3a 50%, #0c1530 75%, #080d1a 100%);
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 500px 500px at 20% 40%, rgba(79, 110, 247, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 400px 400px at 80% 60%, rgba(168, 85, 247, 0.08) 0%, transparent 60%);
        }
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }
        .login-header img {
            height: 50px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 12px rgba(79, 110, 247, 0.3));
        }
        .login-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .login-header p {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 0.95rem;
        }
        .form-group input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4f6ef7;
            background: rgba(79, 110, 247, 0.06);
            box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.1);
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.25);
        }
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4f6ef7, #00d4ff);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(79, 110, 247, 0.4);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .error-msg.show { display: flex; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover { color: #4f6ef7; }
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="../assets/logo-full-new.svg" alt="PrimeAxis IT">
                <h1>Employee Portal</h1>
                <p>Sign in with your credentials</p>
            </div>
            <div id="error" class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="you@primeaxisit.com" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <span>Sign In</span>
                    <div class="spinner" id="spinner"></div>
                    <i class="fas fa-arrow-right" id="arrowIcon"></i>
                </button>
            </form>
            <a href="#" class="back-link" id="forgotLink" onclick="showForgotPassword()" style="color:#4f6ef7;margin-top:12px"><i class="fas fa-key"></i> Forgot Password?</a>
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Website</a>
        </div>
    </div>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('primeaxis_token')) {
            window.location.href = '/portal/';
        }

        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error');
        const errorText = document.getElementById('errorText');
        const loginBtn = document.getElementById('loginBtn');
        const spinner = document.getElementById('spinner');
        const arrowIcon = document.getElementById('arrowIcon');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.remove('show');
            loginBtn.disabled = true;
            spinner.style.display = 'block';
            arrowIcon.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed');

                if (data.user.mustChangePassword) {
                    // Show set new password form
                    document.getElementById('loginForm').style.display = 'none';
                    document.querySelector('.login-header h1').textContent = 'Set New Password';
                    document.querySelector('.login-header p').textContent = 'Your temporary password needs to be changed';
                    const pwDiv = document.createElement('div');
                    pwDiv.id = 'setPasswordForm';
                    pwDiv.innerHTML = `
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="newPassword" placeholder="Enter new password (min 6 chars)" required minlength="6">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                            </div>
                        </div>
                        <button type="button" class="btn-login" id="setPwBtn" onclick="setNewPassword()">
                            <span>Set Password & Continue</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    `;
                    document.querySelector('.login-card').insertBefore(pwDiv, document.querySelector('.back-link'));
                    window._tempToken = data.token;
                    window._tempUser = data.user;
                    return;
                }
                localStorage.setItem('primeaxis_token', data.token);
                localStorage.setItem('primeaxis_user', JSON.stringify(data.user));
                window.location.href = '/portal/';
            } catch (err) {
                errorText.textContent = err.message;
                errorDiv.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                spinner.style.display = 'none';
                arrowIcon.style.display = '';
            }
        });
        async function setNewPassword() {
            const np = document.getElementById('newPassword').value;
            const cp = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('error');
            const errorText = document.getElementById('errorText');

            if (np.length < 6) { errorText.textContent = 'Password must be at least 6 characters'; errorDiv.classList.add('show'); return; }
            if (np !== cp) { errorText.textContent = 'Passwords do not match'; errorDiv.classList.add('show'); return; }
            errorDiv.classList.remove('show');

            const btn = document.getElementById('setPwBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>Setting password...</span><div class="spinner" style="display:block"></div>';

            try {
                const res = await fetch('/api/auth/set-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: window._tempToken, newPassword: np })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to set password');

                localStorage.setItem('primeaxis_token', data.token);
                localStorage.setItem('primeaxis_user', JSON.stringify(data.user));
                window.location.href = '/portal/';
            } catch (err) {
                errorText.textContent = err.message;
                errorDiv.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = '<span>Set Password & Continue</span><i class="fas fa-arrow-right"></i>';
            }
        }
        window.setNewPassword = setNewPassword;

        // ===== FORGOT PASSWORD FLOW =====
        let _resetEmail = '';

        function showForgotPassword() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('forgotLink').style.display = 'none';
            document.querySelector('.login-header h1').textContent = 'Forgot Password';
            document.querySelector('.login-header p').textContent = 'Enter your email to receive a reset code';
            errorDiv.classList.remove('show');

            const div = document.createElement('div');
            div.id = 'forgotStep1';
            div.innerHTML = `
                <div class="form-group">
                    <label for="resetEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="resetEmail" placeholder="your@email.com" required>
                    </div>
                </div>
                <button type="button" class="btn-login" id="sendCodeBtn" onclick="sendResetCode()">
                    <span>Send Reset Code</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
                <a href="#" class="back-link" onclick="location.reload()" style="margin-top:12px"><i class="fas fa-arrow-left"></i> Back to Login</a>
            `;
            const card = document.querySelector('.login-card');
            const backLink = card.querySelector('.back-link:last-child');
            card.insertBefore(div, backLink);
        }

        async function sendResetCode() {
            const email = document.getElementById('resetEmail').value.trim();
            if (!email) { showError('Please enter your email address'); return; }

            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>Sending...</span><div class="spinner" style="display:block"></div>';
            errorDiv.classList.remove('show');

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                _resetEmail = email;
                showCodeStep(data.email);
            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                btn.innerHTML = '<span>Send Reset Code</span><i class="fas fa-paper-plane"></i>';
            }
        }

        function showCodeStep(maskedEmail) {
            const step1 = document.getElementById('forgotStep1');
            if (step1) step1.remove();
            const exist = document.getElementById('forgotStep2');
            if (exist) exist.remove();

            document.querySelector('.login-header h1').textContent = 'Enter Reset Code';
            document.querySelector('.login-header p').textContent = 'Code sent to ' + maskedEmail;

            const div = document.createElement('div');
            div.id = 'forgotStep2';
            div.innerHTML = `
                <div class="form-group">
                    <label for="resetCode">6-Digit Code</label>
                    <div class="input-wrapper">
                        <i class="fas fa-shield-halved"></i>
                        <input type="text" id="resetCode" placeholder="Enter 6-digit code" maxlength="6" pattern="[0-9]{6}" style="letter-spacing:6px;font-size:1.2rem;text-align:center;font-weight:700" required>
                    </div>
                </div>
                <button type="button" class="btn-login" id="verifyCodeBtn" onclick="verifyResetCode()">
                    <span>Verify Code</span>
                    <i class="fas fa-check-circle"></i>
                </button>
                <div style="display:flex;justify-content:space-between;margin-top:12px">
                    <a href="#" class="back-link" onclick="location.reload()" style="margin:0;font-size:0.8rem"><i class="fas fa-arrow-left"></i> Back to Login</a>
                    <a href="#" class="back-link" id="resendLink" onclick="resendCode()" style="margin:0;color:#4f6ef7;font-size:0.8rem"><i class="fas fa-redo"></i> Resend Code</a>
                </div>
                <p id="timerText" style="text-align:center;color:rgba(255,255,255,0.4);font-size:0.8rem;margin-top:8px">Code expires in <span id="countdown">5:00</span></p>
            `;
            const card = document.querySelector('.login-card');
            const backLink = card.querySelector('.back-link:last-child');
            card.insertBefore(div, backLink);
            document.getElementById('resetCode').focus();
            startCountdown();
        }

        let countdownTimer;
        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            let seconds = 300;
            const el = document.getElementById('countdown');
            if (!el) return;
            countdownTimer = setInterval(() => {
                seconds--;
                if (seconds <= 0) {
                    clearInterval(countdownTimer);
                    el.textContent = 'Expired';
                    el.style.color = '#ef4444';
                    return;
                }
                el.textContent = Math.floor(seconds/60) + ':' + String(seconds%60).padStart(2,'0');
            }, 1000);
        }

        async function resendCode() {
            const link = document.getElementById('resendLink');
            link.style.pointerEvents = 'none';
            link.style.opacity = '0.5';
            link.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            errorDiv.classList.remove('show');

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: _resetEmail })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                link.innerHTML = '<i class="fas fa-check"></i> Code Resent!';
                link.style.color = '#10b981';
                startCountdown();
                setTimeout(() => { link.innerHTML = '<i class="fas fa-redo"></i> Resend Code'; link.style.color = '#4f6ef7'; link.style.pointerEvents = 'auto'; link.style.opacity = '1'; }, 3000);
            } catch (err) {
                showError(err.message);
                link.innerHTML = '<i class="fas fa-redo"></i> Resend Code';
                link.style.pointerEvents = 'auto';
                link.style.opacity = '1';
            }
        }

        async function verifyResetCode() {
            const code = document.getElementById('resetCode').value.trim();
            if (!code || code.length !== 6) { showError('Please enter the 6-digit code'); return; }

            const btn = document.getElementById('verifyCodeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>Verifying...</span><div class="spinner" style="display:block"></div>';
            errorDiv.classList.remove('show');

            try {
                const res = await fetch('/api/auth/verify-reset-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: _resetEmail, code })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                if (countdownTimer) clearInterval(countdownTimer);
                showNewPasswordStep(data.resetToken);
            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                btn.innerHTML = '<span>Verify Code</span><i class="fas fa-check-circle"></i>';
            }
        }

        function showNewPasswordStep(resetToken) {
            const step2 = document.getElementById('forgotStep2');
            if (step2) step2.remove();

            document.querySelector('.login-header h1').textContent = 'Set New Password';
            document.querySelector('.login-header p').textContent = 'Code verified! Enter your new password';

            const div = document.createElement('div');
            div.id = 'forgotStep3';
            div.innerHTML = `
                <div class="form-group">
                    <label for="newPwd">New Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPwd" placeholder="Enter new password (min 6 chars)" required minlength="6">
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPwd">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPwd" placeholder="Confirm new password" required>
                    </div>
                </div>
                <button type="button" class="btn-login" id="resetPwdBtn" onclick="resetPassword()">
                    <span>Reset Password</span>
                    <i class="fas fa-check"></i>
                </button>
            `;
            const card = document.querySelector('.login-card');
            const backLink = card.querySelector('.back-link:last-child');
            card.insertBefore(div, backLink);
            window._resetToken = resetToken;
        }

        async function resetPassword() {
            const np = document.getElementById('newPwd').value;
            const cp = document.getElementById('confirmPwd').value;
            if (np.length < 6) { showError('Password must be at least 6 characters'); return; }
            if (np !== cp) { showError('Passwords do not match'); return; }
            errorDiv.classList.remove('show');

            const btn = document.getElementById('resetPwdBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>Resetting...</span><div class="spinner" style="display:block"></div>';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resetToken: window._resetToken, newPassword: np })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                // Show success and redirect to login
                document.getElementById('forgotStep3').innerHTML = `
                    <div style="text-align:center;padding:20px 0">
                        <i class="fas fa-check-circle" style="font-size:48px;color:#10b981;margin-bottom:16px;display:block"></i>
                        <h3 style="color:#fff;margin:0 0 8px">Password Reset Successful!</h3>
                        <p style="color:rgba(255,255,255,0.5);font-size:14px">Redirecting to login...</p>
                    </div>
                `;
                setTimeout(() => location.reload(), 2000);
            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                btn.innerHTML = '<span>Reset Password</span><i class="fas fa-check"></i>';
            }
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorDiv.classList.add('show');
        }

        window.showForgotPassword = showForgotPassword;
        window.sendResetCode = sendResetCode;
        window.verifyResetCode = verifyResetCode;
        window.resendCode = resendCode;
        window.resetPassword = resetPassword;
    </script>
</body>
</html>
